name: Weekly LP Portfolio Report

on:
  schedule:
    - cron: '0 7 * * 0'  # Every Sunday at 10:00 MSK (07:00 UTC)
  workflow_dispatch:  # Manual trigger

jobs:
  report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps
      
      - name: Run tracker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBANK_API_KEY: ${{ secrets.DEBANK_API_KEY }}
          COVALENT_API_KEY: ${{ secrets.COVALENT_API_KEY }}
        run: python main.py
      
      - name: Commit history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Pull latest first (only state/, code already checked out)
          git stash push -- state/ 2>/dev/null || true
          git pull --rebase origin main || true
          git stash pop 2>/dev/null || true
          git add state/
          git diff --staged --quiet || git commit -m "data: weekly snapshot $(date +%Y-%m-%d)"
          git push origin main || true
